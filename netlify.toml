# netlify.toml — Configuration Netlify pour My Poker Shot Clock
# © 2026 by Divinerites — GPL Licence

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src \'self\'; script-src \'self\'; style-src \'self\' https://fonts.bunny.net; font-src https://fonts.bunny.net; img-src \'self\' data: https://user-gen-media-assets.s3.amazonaws.com; connect-src https://fonts.bunny.net; media-src \'none\'; object-src \'none\'; frame-ancestors \'none\';"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"
